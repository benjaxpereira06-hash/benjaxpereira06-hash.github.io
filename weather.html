<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title> Weather APP -FCUL </title>
        
<style>
    body {
        font-family: 'Montserrat', sans-serif;
        margin: 0;
        padding: 20px;
        background-image: url('elg21-darling-9408525.jpg'); 
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
    }

    h1 {
        font-size: 80px; /* Reduzi um pouco para não quebrar em ecrãs menores */
        letter-spacing: 3px;
        text-align: center;
        margin-top: 50px;
    }

    .botao-bonito {        
        color: white;
        background: none;
        border: none;
        outline: none;
        box-shadow: none;
        padding: 15px 25px;       
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;       
        display: flex;             /* Ativa o modo flexível */
        flex-direction: column;    /* Coloca as linhas em coluna */     
        justify-content: space-between;
        height: 50px;
        width: 40px;
    }

    /* Posicionando o botão Menu no topo direito */
    #menu {
        position: absolute;
        top: 20px;
        right: 20px;
    }
    .hamburguer-linha {
    display: block;
    width: 35px; /* Comprimento da linha */
    height: 3px; /* Espessura da linha */
    background-color: white; /* Cor dos traços */
    border-radius: 2px; /* Cantos ligeiramente arredondados */
    transition: all 0.3s ease; /* Animação suave para as transformações futuras */
}

/* Efeito ao passar o rato (opcional) */
    #menu:hover .hamburguer-linha {
     background-color: #ec5353; /* Muda a cor dos traços no hover */
     /* Estilo para o botão que contém o sinal de mais */

    }
    .botao-mais {
    width: 60px;
    height: 60px;
    background: none;
    background-color: none;        
    cursor: pointer;
    position: fixed; 
    top: 60px; 
    right: 20px; 
    display: flex;
    justify-content: center;
    align-items: center;    
    transition: all 0.3s ease;
    z-index: 9999;
    border: none;
    outline: none;
    box-shadow: none;    
    
    
}

.botao-mais:hover {
    background-color: #218838;
    transform: scale(1.1);
}

/* Garante que ambos os traços apareçam */
.botao-mais span {
    background-color: white;
    display: block;
    position: absolute; /* Para ficarem um por cima do outro no centro */
    border-radius: 2px;
}

.linha-vertical {
    width: 4px;
    height: 30px;
}

.linha-horizontal {
    width: 30px;
    height: 4px;
}
    .folha {
        background-color: #6c1413;  
        color: white;
        position: fixed;
        top: 0;
        left: -1000px; /* Um pouco mais que a largura para esconder a sombra */
        width: 800px;
        height: 100vh;         
        box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        transition: left 0.4s ease-in-out;
        padding: 40px;
        z-index: 2000; /* Valor bem alto para ficar acima de tudo */
    }

    .folha.ativa {
        left: 0;
    }

    .search-container {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 40px;
    }

    #cityInput {
        width: 400px;
        height: 50px;
        font-size: 20px;
        padding: 0 15px;
        border-radius: 12px;
        border: 2px solid #ccc;
        outline: none;
    }
    #cityInput:focus {
            border-color: #4facfe;
            box-shadow: 0 0 10px rgba(0,175,255,0.5);
        }
    .weather-container {
        max-width: 600px;
        margin: 40px auto;
        color: white;
        text-align: center;
}

/* Card Principal (Temperatura e Cidade) */
    .main-card {
        background: rgba(255, 255, 255, 0.2); /* Fundo transparente */
        backdrop-filter: blur(10px);          /* Efeito de vidro focado */
        padding: 30px;
        border-radius: 20px;
        margin-bottom: 20px;
        border: 1px solid rgba(255, 255, 255, 0.3);
}

    #temp { font-size: 80px; margin: 10px 0; }

/* Grelha de Detalhes (3 colunas) */
   .details-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
}

   .card {
        background: rgba(108, 20, 19, 0.8); /* Cor bordeaux da tua folha, mas transparente */
        padding: 20px;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: transform 0.3s;
}

   .card:hover { transform: translateY(-5px); }

   .card-icon { font-size: 24px; margin-bottom: 5px; }
   .card p { margin: 5px 0; font-size: 14px; opacity: 0.8; }
   .card strong { font-size: 18px; }   

    #overlay{
        position: fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
    
        backdrop-filter: blur(8px);
        background: rgba(0,0,0,0.2);
    
        display:none;
    
        justify-content:center;
        align-items:center;
}

   #overlay.ativo{
        display:flex;
 }
</style>
</head>











<body>
  <!-- elementos da página -->
  <h1 id="city"></h1>
  <button id="menu" class="botao-bonito" onclick="abrirFolha()"><span class="hamburguer-linha"></span>
  <span class="hamburguer-linha"></span>
  <span class="hamburguer-linha"></span></button>
  <div id="folha" class="folha">
   <h2>Menu</h2>
   <p>Benjamim Pereira Engenharia Fisica</p>
   </div>    

<div class="weather-container">
    <div class="main-card">
        <h2 id="city"></h2>
        <img id="icon" src="" alt="Clima">
        <h1 id="temp">-- °C</h1>
        <p id="desc">Estado do tempo</p>
    </div>

    <div class="details-grid">
        <div class="card">
            <span class="card-icon">💧</span>
            <p>Humidade</p>
            <strong id="humidity">--%</strong>
        </div>
        <div class="card">
            <span class="card-icon">💨</span>
            <p>Vento</p>
            <strong id="wind">-- m/s</strong>
        </div>
        <div class="card">
            <span class="card-icon">👤</span>
            <p>Sensação</p>
            <strong id="feels">-- °C</strong>
        </div>
    </div>
 </div>
 <button class="botao-mais" id="botao-mais" onclick="mostrarPesquisa()">
    <span class="linha-vertical"></span>
    <span class="linha-horizontal"></span>
 </button>

<div id="overlay">
    
<div class="search-container">

        <input id="cityInput" type="text" placeholder="Escreve a cidade...">
        <button class="botão bonito" onclick="procurarCidade()">
            Procurar
             </button>
     </div>  
</div>   

  
  <script src="script.js"></script>
</body>
