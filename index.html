    <style>
        body {
                font-family: sans-serif;
                margin: 0;

        .contentor-layout {
                display: flex;          /* Ativa o modo flexível */
                align-items: center;    /* Alinha tudo verticalmente ao centro */

              color: white;
              padding: 15px 25px;

              border-radius: 8px;
              cursor: pointer;
              font-size: 16px;
              }
        
        .botao-bonito:hover {
             background-color: #218838; /* Muda de cor ao passar o rato */
             }
        
        img {
             width: 300px;         /* Define o tamanho da imagem */
             border-radius: 15px;  /* Deixa os cantos arredondados */
