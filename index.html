<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title> Benjamim Pereira: Engenheiro Fisico </title>
        
    <style>
        body {
                font-family: sans-serif;
                margin: 0;
                padding: 20px;
            }

            
        .contentor-layout {
                display: flex;          /* Ativa o modo flexível */
                align-items: center;    /* Alinha tudo verticalmente ao centro */
                justify-content: space-between; /* Empurra os elementos para as extremidades */
                background-color: transparent;
                padding: 20px;
                border-radius: 10px;
            }
            .item-esquerda {
                flex: 1; /* Ocupa espaço à esquerda */
                }
        
            .item-centro {
                    flex: 1;
                    text-align: center; /* Garante que o texto fique mesmo no meio */
                }
        
            .item-direita {
                    flex: 1;
                    text-align: right; /* Empurra o conteúdo para a direita */
                }
    
         h1 {
                text-align: center;
                width: 100%; /* Garante que ele ocupa a largura toda do bloco dele */
                margin: 0;
                }
   
        .botao-bonito {
              background-color: #f2c2c2;
              color: white;
              padding: 15px 25px;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              font-size: 16px;
              }
        
        .botao-bonito:hover {
             background-color: #218838; /* Muda de cor ao passar o rato */
        }
        .botaodireita {
              background-color: #f2c2c2;
              color: white;
              padding: 15px 25px;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              font-size: 16px;
              float: right;  
            
             }
        
        img {
             width: 1000px;         /* Define o tamanho da imagem */
             border-radius: 0px;  /* Deixa os cantos arredondados */
             margin-top: 20px;
             }    
            
        .folha {
          background-color: #6c1413;  
          position: fixed;
          top: 0;
          left: -100%;           /* começa fora do ecrã */
          width: 400px;
          height: 100vh;         
          box-shadow: 2px 0 10px rgba(0,0,0,0.2);
          transition: left 0.4s ease;  /* animação suave */
          padding: 20px;
        }
        
        .folha.ativa {
          left: 0;               /* desliza para dentro */
         }     
    
    
    
    
    
    
    
    
    
    
    </style>
</head>    

    
    
    
    
    

<body>   
    
    
    
    
    <h1>Bem Vindo !!! </h1>
    <div class="contentor-layout">
        <div class="item-esquerda">
            <span>Benjamim Pereira FCUL</span>
        </div> 
        
    </div> 
    <button class="botaodireita" id="cancelar" style="display:none" onclick="fecharFolha()" >SAIR </button>        
        
     
    
    <br><br>                         
    <a href="" target="_blank">
    <button class="botao-bonito" >
        BONUS
    </button>        
    </a>    
    <br>
    <button id="menu" class="botao-bonito" onclick="abrirFolha()">menu</button>
    <div id="folha" class="folha">
    <h2>Menu</h2>
    <p>Isto deslizou da esquerda.</p>
    </div>    
    <br><br>
        <input id="cityInput" placeholder="Cidade">
    
    <button class="botaodireita" onclick="procurarCidade()">
    Procurar
    </button>    

    

    <script src="script.js"></script>
</body>
</html>
