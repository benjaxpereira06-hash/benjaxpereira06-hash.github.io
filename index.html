<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title> Weather APP -FCUL </title>
        
<style>
    body {
        font-family: 'Montserrat', sans-serif;
        margin: 0;
        padding: 20px;
        background-image: url('elg21-darling-9408525.jpg'); 
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
    }

    h1 {
        font-size: 80px; /* Reduzi um pouco para não quebrar em ecrãs menores */
        letter-spacing: 3px;
        text-align: center;
        margin-top: 50px;
    }

    .botao-bonito, .botaodireita {
        background-color: #f2c2c2;
        color: white;
        padding: 15px 25px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    .botao-bonito:hover, .botaodireita:hover {
        background-color: #218838;
    }

    /* Posicionando o botão Menu no topo direito */
    #menu {
        position: absolute;
        top: 20px;
        right: 20px;
    }
    #cancelar {
        position: absolute;
        top: 20px;
        right: 20px;
    }
    .folha {
        background-color: #6c1413;  
        color: white;
        position: fixed;
        top: 0;
        left: -1000px; /* Um pouco mais que a largura para esconder a sombra */
        width: 800px;
        height: 100vh;         
        box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        transition: left 0.4s ease-in-out;
        padding: 40px;
        z-index: 2000; /* Valor bem alto para ficar acima de tudo */
    }

    .folha.ativa {
        left: 0;
    }

    .search-container {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 40px;
    }

    #cityInput {
        width: 400px;
        height: 50px;
        font-size: 20px;
        padding: 0 15px;
        border-radius: 12px;
        border: 2px solid #ccc;
        outline: none;
    }
    #cityInput:focus {
            border-color: #4facfe;
            box-shadow: 0 0 10px rgba(0,175,255,0.5);
        }   
</style>
</head>
    
    

<body>   
    
    
    
    
    <h1>Weather App </h1>        
   
    <button class="botaodireita" id="cancelar" style="display:none" onclick="fecharFolha()" >SAIR </button>         
     
    
  
    <br>
    <button id="menu" class="botao-bonito" onclick="abrirFolha()">menu</button>
    <div id="folha" class="folha">
    <h2>Menu</h2>
    <p>Benjamim Pereira Engenharia Fisica</p>
    </div>    
    <br><br>
    <div class="search-container">

        <input id="cityInput" type="text" placeholder="Escreve a cidade...">
        <button class="botão bonito" onclick="procurarCidade()">
            Procurar
             </button>
     </div>   

    

    <script src="script.js"></script>
</body>
</html>
