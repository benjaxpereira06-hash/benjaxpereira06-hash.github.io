<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title> Benjamim Pereira: Engenheiro Fisico </title>
        
    <style>
        body {
                font-family: sans-serif;
                margin: 0;
                padding: 20px;
            }
        h1 {
            text-align: center;
            width: 100%; /* Garante que ele ocupa a largura toda do bloco dele */
            margin: 0;
            }
            
            .contentor-layout {
                display: flex;          /* Ativa o modo flexível */
                align-items: center;    /* Alinha tudo verticalmente ao centro */
                justify-content: space-between; /* Empurra os elementos para as extremidades */
                background-color: #eee;
                padding: 20px;
                border-radius: 10px;
            }
            .item-esquerda {
            flex: 1; /* Ocupa espaço à esquerda */
            }
    
            .item-centro {
                flex: 1;
                text-align: center; /* Garante que o texto fique mesmo no meio */
            }
    
            .item-direita {
                flex: 1;
                text-align: right; /* Empurra o conteúdo para a direita */
            }
    
            button {
                padding: 10px 20px;
                cursor: pointer;
            }
   </style>
</head>    
<body>
    <h1>Bem Vindo !!! </h1>
    <div class="contentor-layout">      
        <div class="item-esquerda">
            <span>Benjamim Pereira FCUL</span>
        </div>       
</body>
</html>
