<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title> Weather APP -FCUL </title>
        
    <style>
        body {
                font-family: 'Montserrat' , sans-serif;
                margin: 0;
                padding: 20px;

                background-image: url('elg21-darling-9408525.jpg'); 
                background-size: cover;           /* Faz a imagem cobrir a tela toda */
                background-position: center;      /* Centraliza a imagem */
                background-attachment: fixed;     /* A imagem não mexe quando faz scroll */
                background-repeat: no-repeat;     /* Não deixa a imagem repetir como um mosaico */
            
                    
            }

            

    
           h1{
                    font-family: 'Montserrat', sans-serif;
                    font-size: 100px;
                    letter-spacing: 3px;
                    text-align: center;   
                    }
   
        .botao-bonito {
              background-color: #f2c2c2;
              color: white;
              padding: 15px 25px;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              font-size: 16px;
              }
        
        .botao-bonito:hover {
             background-color: #218838; /* Muda de cor ao passar o rato */
        }
        .botaodireita {
              background-color: #f2c2c2;
              color: white;
              padding: 15px 25px;
              border: none;
              border-radius: 8px;
              cursor: pointer;
              font-size: 16px;
              float: right;  
            
            
        

            
        .folha {
          background-color: #6c1413;  
          position: fixed;
          top: 0;
          left: -100%;           /* começa fora do ecrã */
          width: 800px;
          height: 100vh;         
          box-shadow: 2px 0 10px rgba(0,0,0,0.2);
          transition: left 0.4s ease;  /* animação suave */
          padding: 20px;
          z-index: 1000;  
        }
        
        .folha.ativa {
          left: 0;               /* desliza para dentro */
         }     
        .search-container{
            display:flex;
            justify-content:center;
            margin-top:40px;
        }
        }
        
        #cityInput {
            width: 400px;        /* largura grande */
            height: 50px;        /* altura maior */
            font-size: 24px;     /* letra grande */
            padding: 10px;
            border-radius: 12px;
            border: 2px solid #ccc;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
        #cityInput:focus {
            border-color: #4facfe;
            box-shadow: 0 0 10px rgba(0,175,255,0.5);
        }   
            
    
    
    
    
    
    
    
    
    </style>
</head>    

    
    
    
    
    

<body>   
    
    
    
    
    <h1>Weather App </h1>        
   
    <button class="botaodireita" id="cancelar" style="display:none" onclick="fecharFolha()" >SAIR </button>         
     
    
  
    <br>
    <button id="menu" class="botao-bonito" onclick="abrirFolha()">menu</button>
    <div id="folha" class="folha">
    <h2>Menu</h2>
    <p>Benjamim Pereira Engenharia Fisica</p>
    </div>    
    <br><br>
    <div class="search-container">

        <input id="cityInput" type="text" placeholder="Escreve a cidade...">
        <button onclick="procurarCidade()">
            Procurar
             </button>
     </div>   

    

    <script src="script.js"></script>
</body>
</html>
